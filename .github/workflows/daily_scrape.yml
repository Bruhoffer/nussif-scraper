name: Daily PTR Trades Scraper

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run daily Senate PTR scraper
      run: |
        # Scrapes last 3 days to catch delayed filings.
        # Idempotent upsert means re-running is always safe.
        python run_daily.py --days 3

    - name: Recompute portfolio snapshots
      run: |
        # Incremental — only adds snapshots for dates newer than the last stored one.
        python -m ingest.portfolio_snapshots

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/ptr_trades.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily scrape and price update [skip ci]" && git push)

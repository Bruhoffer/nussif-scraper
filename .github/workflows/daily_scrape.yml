name: Daily PTR Trades Scraper

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12' # or whatever version you prefer
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper and Update Prices
      run: |
        # Scrape last 3 days to catch delayed filings, updates existing trades safely 
        # because of idempotent upsert, and updates all historical prices
        python ingest_ptr_trades.py --days 3

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Add the sqlite database
        git add data/ptr_trades.db
        
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily scrape and price update [skip ci]" && git push)

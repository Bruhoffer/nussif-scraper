name: Weekly Congress Trades Scraper

on:
  schedule:
    # Run every Sunday at 01:00 UTC (after the daily run has finished)
    - cron: '0 1 * * 0'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run weekly scraper (Senate PTR + Congress API)
      env:
        RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
      run: |
        # Runs Senate PTR (last 7 days) + full RapidAPI Congress pull.
        # Idempotent upsert means re-running is always safe.
        python run_weekly.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/ptr_trades.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated weekly scrape and price update [skip ci]" && git push)
